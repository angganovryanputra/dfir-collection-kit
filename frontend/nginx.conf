server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # CSP is set by the nginx reverse proxy (nginx-ssl.conf) — do not duplicate here.
    # A second CSP header would be ANDed with the proxy's header by browsers,
    # making the effective policy more restrictive than intended.

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite uses content hashes)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|svg|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No caching for index.html (so new deployments are picked up)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
