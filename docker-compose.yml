version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: dfir-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dfir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set. Run scripts/generate-secrets.sh}
      POSTGRES_DB:       ${POSTGRES_DB:-dfir}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - dfir_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dfir} -d ${POSTGRES_DB:-dfir}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - dfir-network

  redis:
    image: redis:7-alpine
    container_name: dfir-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-CHANGE_ME_REDIS}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME_REDIS}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - dfir-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dfir-backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dfir}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-dfir}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set. Run scripts/generate-secrets.sh}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      EVIDENCE_STORAGE_PATH: /vault/evidence
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET:?AGENT_SHARED_SECRET must be set. Run scripts/generate-secrets.sh}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      DFIR_DEFAULT_ADMIN_PASSWORD:   ${DFIR_DEFAULT_ADMIN_PASSWORD:?DFIR_DEFAULT_ADMIN_PASSWORD must be set}
      DFIR_DEFAULT_ANALYST_PASSWORD: ${DFIR_DEFAULT_ANALYST_PASSWORD:-}
      DFIR_DEFAULT_VIEWER_PASSWORD:  ${DFIR_DEFAULT_VIEWER_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost}
      EZTOOLS_DIR:      ${EZTOOLS_DIR:-/opt/eztools}
      HAYABUSA_PATH:    ${HAYABUSA_PATH:-/opt/hayabusa/hayabusa}
      CHAINSAW_PATH:    ${CHAINSAW_PATH:-/opt/chainsaw/chainsaw}
      SIGMA_RULES_DIR:  ${SIGMA_RULES_DIR:-/opt/chainsaw/rules/}
      CELERY_BROKER_URL:    redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS}@redis:6379/0
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    # Backend is only reachable via the nginx proxy — no direct host port
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dfir_evidence:/vault/evidence
    healthcheck:
      test: ["CMD-SHELL", "curl -f --silent --max-time 4 http://localhost:8000/api/v1/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - dfir-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dfir-celery-worker
    command: celery -A app.worker.celery_app worker --loglevel=info --pool=solo
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dfir}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-dfir}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET:?AGENT_SHARED_SECRET must be set}
      EVIDENCE_STORAGE_PATH: /vault/evidence
      EZTOOLS_DIR:      ${EZTOOLS_DIR:-/opt/eztools}
      HAYABUSA_PATH:    ${HAYABUSA_PATH:-/opt/hayabusa/hayabusa}
      CHAINSAW_PATH:    ${CHAINSAW_PATH:-/opt/chainsaw/chainsaw}
      SIGMA_RULES_DIR:  ${SIGMA_RULES_DIR:-/opt/chainsaw/rules/}
      CELERY_BROKER_URL:    redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dfir_evidence:/vault/evidence
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - dfir-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://localhost/api/v1}
    container_name: dfir-frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Frontend is only reachable via the nginx proxy — no direct host port
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f --silent --max-time 4 http://0.0.0.0:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - dfir-network

  # ── HTTPS reverse proxy ──────────────────────────────────────────────────────
  # Terminates TLS and proxies to backend (:8000) and frontend (:80).
  # Run scripts/generate-self-signed-cert.sh for local dev certificates.
  nginx:
    image: nginx:1.27-alpine
    container_name: dfir-nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # required to bind :80 and :443 as non-root
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/api/v1/status/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dfir-network

networks:
  dfir-network:
    driver: bridge

volumes:
  dfir_postgres:
    driver: local
  dfir_evidence:
    driver: local
