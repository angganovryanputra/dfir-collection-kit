version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dfir
      POSTGRES_PASSWORD: dfir
      POSTGRES_DB: dfir
    ports:
      - "5432:5432"
    volumes:
      - dfir_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfir -d dfir"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://dfir:dfir@db:5432/dfir
      SECRET_KEY: change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/incidents')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  dfir_postgres:
