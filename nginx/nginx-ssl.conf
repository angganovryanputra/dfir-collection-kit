# DFIR Collection Kit — HTTPS reverse proxy
# Handles TLS termination, security headers, rate limiting, and proxying to backend + frontend.

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Defined outside server blocks so they apply across both HTTP and HTTPS.
limit_req_zone $binary_remote_addr zone=api_ratelimit:10m    rate=60r/s;
limit_req_zone $binary_remote_addr zone=heavy_ratelimit:5m   rate=6r/m;
limit_req_zone $binary_remote_addr zone=auth_ratelimit:5m    rate=20r/m;

# ── HTTP — proxy directly (no redirect) ───────────────────────────────────────
# Serving the app on both HTTP and HTTPS ensures relative /api/v1 calls are
# always same-origin regardless of which scheme the browser uses, eliminating
# all CORS errors without requiring a trusted TLS certificate.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10g;
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout 10s;

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_request_buffering  off;
        proxy_buffering          off;
    }

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # TLS certificate (mounted from nginx/certs/ on the host)
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # TLS hardening — TLS 1.2/1.3 only, strong ciphers
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' http://localhost http://localhost:* http://127.0.0.1 http://127.0.0.1:* https: ws://localhost ws://localhost:* wss:; font-src 'self' https://fonts.gstatic.com data:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

    # Upload size limit — evidence ZIPs can be large
    client_max_body_size 10g;

    # Timeouts for long-running evidence uploads
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_connect_timeout 10s;

    # ── Backend API — auth endpoints (tighter rate limit) ────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_ratelimit burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Backend API — heavy endpoints (evidence export, report, SIEM) ────────
    location ~ ^/api/v1/(evidence/exports|incidents/[^/]+/report|platform/siem-export) {
        limit_req zone=heavy_ratelimit burst=2 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_request_buffering  off;
        proxy_buffering          off;
    }

    # ── Backend API — general (60 req/s burst) ────────────────────────────────
    location /api/ {
        limit_req zone=api_ratelimit burst=120 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_request_buffering  off;
        proxy_buffering          off;
    }

    # ── Frontend SPA — static assets with long-lived cache ───────────────────
    # Vite uses content hashes in filenames so 1-year cache is safe.
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_cache_valid 200 1d;
    }

    # ── Frontend SPA — HTML routes (no cache — always fresh) ─────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
